[theme]
primaryColor             = "#8B6914"   # gold
backgroundColor          = "#F4EFE6"   # parchment cream
secondaryBackgroundColor = "#F0EBE0"   # slightly deeper cream
textColor                = "#2A2118"   # dark espresso brown
font                     = "sans serif"

[server]
headless    = true    # required for Streamlit Community Cloud
enableCORS  = false
